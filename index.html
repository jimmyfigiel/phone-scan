<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>Phone Barcode Scanner</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />

  <link rel="manifest" href="manifest.json" />

  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --panel2: #374151;
      --text: #f9fafb;
      --muted: #d1d5db;
      --good: #22c55e;
      --bad: #ef4444;
      --warn: #f59e0b;
      --button: #2563eb;
      --button2: #4b5563;
      --danger: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 14px 16px;
      background: #030712;
      border-bottom: 1px solid #374151;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      margin: 0;
      font-size: 1.25rem;
    }

    main {
      padding: 14px;
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: var(--panel);
      border: 1px solid #374151;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .small {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--warn);
      display: inline-block;
      flex: 0 0 auto;
    }

    .dot.good {
      background: var(--good);
    }

    .dot.bad {
      background: var(--bad);
    }

    button,
    input,
    select {
      font: inherit;
      border-radius: 12px;
      border: 1px solid #4b5563;
      padding: 12px;
      min-height: 48px;
    }

    button {
      color: white;
      background: var(--button);
      border: 0;
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      background: var(--button2);
    }

    button.danger {
      background: var(--danger);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input,
    select {
      width: 100%;
      background: #030712;
      color: var(--text);
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .row > * {
      flex: 1 1 140px;
    }

    #reader {
      width: 100%;
      overflow: hidden;
      border-radius: 16px;
      background: #030712;
      border: 1px solid #4b5563;
    }

    #reader video {
      border-radius: 16px;
    }

    .result {
      background: #030712;
      border: 1px solid #4b5563;
      border-radius: 12px;
      padding: 12px;
      min-height: 60px;
      font-size: 1.35rem;
      font-weight: 800;
      word-break: break-all;
    }

    .match {
      border-color: var(--good);
      color: #bbf7d0;
    }

    .mismatch {
      border-color: var(--bad);
      color: #fecaca;
    }

    .history {
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
    }

    .history-item {
      background: #030712;
      border: 1px solid #4b5563;
      border-radius: 12px;
      padding: 10px;
      word-break: break-all;
    }

    .history-time {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    .hidden {
      display: none !important;
    }

    .warning {
      background: #422006;
      border: 1px solid #92400e;
      color: #fde68a;
      border-radius: 12px;
      padding: 10px;
      margin-top: 10px;
      font-size: 0.92rem;
    }
  </style>
</head>

<body>
  <header>
    <h1>Phone Barcode Scanner</h1>
    <div class="status-row">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">Scanner stopped</span>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="grid">
        <div id="reader"></div>

        <div class="row">
          <button id="startButton">Start Scanner</button>
          <button id="stopButton" class="danger" disabled>Stop</button>
        </div>

        <div class="row">
          <button id="copyButton" class="secondary" disabled>Copy Last</button>
          <button id="clearButton" class="secondary">Clear History</button>
        </div>

        <div>
          <label for="cameraSelect">Camera</label>
          <select id="cameraSelect">
            <option value="">Default back camera</option>
          </select>
        </div>

        <div>
          <label for="expectedInput">Expected barcode, optional</label>
          <input id="expectedInput" type="text" placeholder="Example: 3148701009183" />
        </div>

        <div>
          <label for="lastResult">Last scanned value</label>
          <div id="lastResult" class="result">None yet</div>
        </div>

        <div id="secureWarning" class="warning hidden">
          Camera access usually requires HTTPS. If the scanner does not start, publish this folder with GitHub Pages or another HTTPS host.
        </div>
      </div>
    </section>

    <section class="card">
      <h2 style="margin-top:0;">Manual test</h2>
      <p class="small">
        Use this to test the match/copy/history behavior without using the camera.
      </p>

      <div class="grid">
        <input id="manualInput" type="text" placeholder="Type a barcode value here" />
        <button id="manualButton" class="secondary">Add Manual Scan</button>
      </div>
    </section>

    <section class="card">
      <h2 style="margin-top:0;">Scan History</h2>
      <div id="history" class="history"></div>
    </section>
  </main>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    const readerId = "reader";

    const startButton = document.getElementById("startButton");
    const stopButton = document.getElementById("stopButton");
    const copyButton = document.getElementById("copyButton");
    const clearButton = document.getElementById("clearButton");

    const cameraSelect = document.getElementById("cameraSelect");
    const expectedInput = document.getElementById("expectedInput");
    const lastResult = document.getElementById("lastResult");
    const historyEl = document.getElementById("history");

    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const secureWarning = document.getElementById("secureWarning");

    const manualInput = document.getElementById("manualInput");
    const manualButton = document.getElementById("manualButton");

    let html5QrCode = null;
    let isScanning = false;

    let lastValue = "";
    let lastScanTime = 0;
    let duplicateDelayMs = 1500;

    function setStatus(kind, text) {
      statusDot.classList.remove("good", "bad");

      if (kind === "good") {
        statusDot.classList.add("good");
      } else if (kind === "bad") {
        statusDot.classList.add("bad");
      }

      statusText.textContent = text;
    }

    function isSecureEnoughForCamera() {
      return (
        window.isSecureContext ||
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1"
      );
    }

    function normalizeBarcode(value) {
      return String(value || "").trim();
    }

    function getExpectedValue() {
      return normalizeBarcode(expectedInput.value);
    }

    function updateResultBox(value) {
      const expected = getExpectedValue();

      lastResult.classList.remove("match", "mismatch");

      if (!value) {
        lastResult.textContent = "None yet";
        return;
      }

      lastResult.textContent = value;

      if (expected) {
        if (value === expected) {
          lastResult.classList.add("match");
        } else {
          lastResult.classList.add("mismatch");
        }
      }
    }

    function addHistory(value, source) {
      const expected = getExpectedValue();
      const item = document.createElement("div");

      item.className = "history-item";

      const time = new Date().toLocaleTimeString();

      let matchText = "";
      if (expected) {
        matchText = value === expected ? " ✅ matches expected" : " ❌ does not match expected";
      }

      item.innerHTML = `
        <div class="history-time">${time} — ${source}${matchText}</div>
        <div>${escapeHtml(value)}</div>
      `;

      historyEl.prepend(item);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function handleScannedValue(rawValue, source = "camera") {
      const value = normalizeBarcode(rawValue);

      if (!value) {
        return;
      }

      const now = Date.now();

      const isDuplicate =
        value === lastValue &&
        now - lastScanTime < duplicateDelayMs;

      if (isDuplicate) {
        return;
      }

      lastValue = value;
      lastScanTime = now;

      updateResultBox(value);
      addHistory(value, source);

      copyButton.disabled = false;

      if (navigator.vibrate) {
        navigator.vibrate(80);
      }
    }

    async function loadCameras() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
        return;
      }

      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(device => device.kind === "videoinput");

        cameraSelect.innerHTML = '<option value="">Default back camera</option>';

        videoDevices.forEach((device, index) => {
          const option = document.createElement("option");
          option.value = device.deviceId;
          option.textContent = device.label || `Camera ${index + 1}`;
          cameraSelect.appendChild(option);
        });
      } catch (err) {
        console.log("Could not enumerate cameras:", err);
      }
    }

    function getScannerConfig() {
      const formatsToSupport = [];

      if (window.Html5QrcodeSupportedFormats) {
        formatsToSupport.push(
          Html5QrcodeSupportedFormats.QR_CODE,
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.CODE_93,
          Html5QrcodeSupportedFormats.ITF,
          Html5QrcodeSupportedFormats.CODABAR,
          Html5QrcodeSupportedFormats.PDF_417,
          Html5QrcodeSupportedFormats.DATA_MATRIX
        );
      }

      const config = {
        fps: 10,
        qrbox: function(viewfinderWidth, viewfinderHeight) {
          const minEdge = Math.min(viewfinderWidth, viewfinderHeight);

          return {
            width: Math.floor(minEdge * 0.9),
            height: Math.floor(minEdge * 0.45)
          };
        },
        aspectRatio: 1.7777778,
        rememberLastUsedCamera: true,
        showTorchButtonIfSupported: true,
        showZoomSliderIfSupported: true,
        disableFlip: true
      };

      if (formatsToSupport.length > 0) {
        config.formatsToSupport = formatsToSupport;
      }

      return config;
    }

    async function startScanner() {
      if (isScanning) {
        return;
      }

      if (!isSecureEnoughForCamera()) {
        secureWarning.classList.remove("hidden");
      }

      try {
        setStatus("", "Starting camera...");

        if (!html5QrCode) {
          html5QrCode = new Html5Qrcode(readerId, {
            verbose: false
          });
        }

        const selectedCameraId = cameraSelect.value;

        let cameraConfig;

        if (selectedCameraId) {
          cameraConfig = {
            deviceId: {
              exact: selectedCameraId
            }
          };
        } else {
          cameraConfig = {
            facingMode: "environment"
          };
        }

        await html5QrCode.start(
          cameraConfig,
          getScannerConfig(),
          function(decodedText, decodedResult) {
            handleScannedValue(decodedText, "camera");
          },
          function(errorMessage) {
            // This fires constantly while scanning, so keep it quiet.
          }
        );

        isScanning = true;

        startButton.disabled = true;
        stopButton.disabled = false;

        setStatus("good", "Scanner running");

        await loadCameras();

      } catch (err) {
        console.error(err);

        setStatus("bad", "Scanner failed to start");

        alert(
          "The scanner could not start.\n\n" +
          err.message + "\n\n" +
          "Make sure you are using HTTPS and have allowed camera permission."
        );

        startButton.disabled = false;
        stopButton.disabled = true;
      }
    }

    async function stopScanner() {
      if (!html5QrCode || !isScanning) {
        return;
      }

      try {
        await html5QrCode.stop();
        await html5QrCode.clear();
      } catch (err) {
        console.log("Stop scanner error:", err);
      }

      isScanning = false;

      startButton.disabled = false;
      stopButton.disabled = true;

      setStatus("", "Scanner stopped");
    }

    async function copyLastValue() {
      if (!lastValue) {
        return;
      }

      try {
        await navigator.clipboard.writeText(lastValue);
        setStatus("good", "Copied last value");
      } catch (err) {
        alert("Could not copy automatically. Last value:\n\n" + lastValue);
      }
    }

    function clearHistory() {
      historyEl.innerHTML = "";
      lastValue = "";
      lastScanTime = 0;
      copyButton.disabled = true;
      updateResultBox("");
      setStatus("", isScanning ? "Scanner running" : "Scanner stopped");
    }

    startButton.addEventListener("click", startScanner);
    stopButton.addEventListener("click", stopScanner);
    copyButton.addEventListener("click", copyLastValue);
    clearButton.addEventListener("click", clearHistory);

    manualButton.addEventListener("click", () => {
      handleScannedValue(manualInput.value, "manual");
      manualInput.select();
    });

    manualInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        handleScannedValue(manualInput.value, "manual");
        manualInput.select();
      }
    });

    expectedInput.addEventListener("input", () => {
      updateResultBox(lastValue);
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(err => {
        console.log("Service worker registration failed:", err);
      });
    }

    if (!isSecureEnoughForCamera()) {
      secureWarning.classList.remove("hidden");
    }

    loadCameras();
  </script>
</body>
</html>
